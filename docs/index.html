<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>我的个人知识库</title> <!-- 网页标题 -->
  <!-- 引入主题样式，这里使用的是 Vue 风格，清新简洁 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '我的知识库', // 左上角显示的网站名称
      repo: 'https://github.com/MarvenHe/my_viki.git', // 替换为你的 GitHub 仓库地址，右上角会显示 GitHub 图标
      loadSidebar: true,   // 开启侧边栏
      subMaxLevel: 3,      // 侧边栏自动抓取标题层级，2表示抓取到二级标题
      search: 'auto',      // 开启全文搜索
      coverpage: false      // 封面页（可选） 开启| 关闭
    }
  </script>
  <!-- 引入 docsify 核心脚本 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <!-- 引入搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 引入字数统计插件（可选） -->
  <script src="//cdn.jsdelivr.net/npm/docsify-count/dist/countable.min.js"></script>
</body>
</html>
